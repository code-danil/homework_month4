<!DOCTYPE html>
<html>
<head>
    <title>Товары категории</title>
</head>
<body>
    <h1>Товары в категории: {{ category.name }}</h1>

    <ul>
        {% for product in products %}
            <li>
                <strong>{{ product.name }}</strong> — Цена: {{ product.price }} руб.
            </li>
        {% empty %}
            <li>В этой категории пока нет товаров.</li>
        {% endfor %}
    </ul>

    <hr>
    <a href="{% url 'category_list' %}">← Назад ко всем категориям</a>
</body>
</html>
